name: "Unit tests"

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

jobs:
  unit-tests:
    name: "Unit tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm bootstrap

      - name: Build SDK
        working-directory: ./packages/nocodb-sdk
        run: |
          pnpm run generate:sdk
          pnpm run build:main

      - name: Run tests
        working-directory: ./packages/nocodb
        run: pnpm run test